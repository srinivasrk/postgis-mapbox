services:
  db:
    image: timescale/timescaledb-ha:pg16-all-oss
    container_name: seattle-traffic-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: traffic
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d traffic"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
